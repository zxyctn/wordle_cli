# GSD Agent Configuration — managed by get-shit-done installer
[features]
multi_agent = true
default_mode_request_user_input = true

[agents]
max_threads = 4
max_depth = 2

[agents.gsd-codebase-mapper]
description = "Explores codebase and writes structured analysis documents. Spawned by map-codebase with a focus area (tech, arch, quality, concerns). Writes documents directly to reduce orchestrator context load."
config_file = "agents/gsd-codebase-mapper.toml"

[agents.gsd-debugger]
description = "Investigates bugs using scientific method, manages debug sessions, handles checkpoints. Spawned by /gsd:debug orchestrator."
config_file = "agents/gsd-debugger.toml"

[agents.gsd-executor]
description = "Executes GSD plans with atomic commits, deviation handling, checkpoint protocols, and state management. Spawned by execute-phase orchestrator or execute-plan command."
config_file = "agents/gsd-executor.toml"

[agents.gsd-integration-checker]
description = "Verifies cross-phase integration and E2E flows. Checks that phases connect properly and user workflows complete end-to-end."
config_file = "agents/gsd-integration-checker.toml"

[agents.gsd-nyquist-auditor]
description = "Fills Nyquist validation gaps by generating tests and verifying coverage for phase requirements"
config_file = "agents/gsd-nyquist-auditor.toml"

[agents.gsd-phase-researcher]
description = "Researches how to implement a phase before planning. Produces RESEARCH.md consumed by gsd-planner. Spawned by /gsd:plan-phase orchestrator."
config_file = "agents/gsd-phase-researcher.toml"

[agents.gsd-plan-checker]
description = "Verifies plans will achieve phase goal before execution. Goal-backward analysis of plan quality. Spawned by /gsd:plan-phase orchestrator."
config_file = "agents/gsd-plan-checker.toml"

[agents.gsd-planner]
description = "Creates executable phase plans with task breakdown, dependency analysis, and goal-backward verification. Spawned by /gsd:plan-phase orchestrator."
config_file = "agents/gsd-planner.toml"

[agents.gsd-project-researcher]
description = "Researches domain ecosystem before roadmap creation. Produces files in .planning/research/ consumed during roadmap creation. Spawned by /gsd:new-project or /gsd:new-milestone orchestrators."
config_file = "agents/gsd-project-researcher.toml"

[agents.gsd-research-synthesizer]
description = "Synthesizes research outputs from parallel researcher agents into SUMMARY.md. Spawned by /gsd:new-project after 4 researcher agents complete."
config_file = "agents/gsd-research-synthesizer.toml"

[agents.gsd-roadmapper]
description = "Creates project roadmaps with phase breakdown, requirement mapping, success criteria derivation, and coverage validation. Spawned by /gsd:new-project orchestrator."
config_file = "agents/gsd-roadmapper.toml"

[agents.gsd-verifier]
description = "Verifies phase goal achievement through goal-backward analysis. Checks codebase delivers what phase promised, not just that tasks completed. Creates VERIFICATION.md report."
config_file = "agents/gsd-verifier.toml"

